version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
  exclusions:
    presets:
      - std-error-handling
  settings:
    errcheck:
      check-type-assertions: true
      # Best-effort calls whose errors are intentionally ignored in a CLI:
      # terminal writes, deferred closes, temp-file cleanup, and cobra flag
      # registration (panics only on programmer error).
      exclude-functions:
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
        - (*text/tabwriter.Writer).Flush
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - os.Remove
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Scanln

formatters:
  enable:
    - gofmt
    - goimports

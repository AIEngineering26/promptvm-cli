name: Release

on:
  push:
    tags:
      - "v*"
  # Manual re-run/testing hook — goreleaser still requires a tag to publish.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      # Keep the goreleaser-built binaries available for the npm-publish job.
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # npm distribution (US-006/US-007).
  #
  # goreleaser has NO native npm publisher, so this job runs the custom release
  # step (scripts/build-npm-packages.mjs) to generate the root `promptvm`
  # package + per-platform `@promptvm/cli-*` sub-packages from the binaries
  # goreleaser just built, then publishes them in lockstep with the tag.
  #
  # GATED: publish is disabled until `promptvm` name + `@promptvm` org ownership
  # on npm is confirmed AND the `NPM_TOKEN` secret is set. Until then this job
  # only stages + dry-run-packs the layout (no `npm publish`). To enable a real
  # publish, set the `NPM_TOKEN` secret and the `PUBLISH_NPM` repo variable to
  # "true". See docs/runbooks/npm-release.md.
  npm-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Stage + verify npm packages (dry-run)
        run: node scripts/build-npm-packages.mjs --version "${GITHUB_REF_NAME}" --dry-run
      # NOTE: the `secrets` context is not available in `if:` expressions —
      # referencing it there invalidates the whole workflow file at parse time
      # (every push then records a 0-job "failure" run). Gate on the repo var
      # and route the secret through env instead.
      - name: Publish npm packages (gated)
        if: ${{ vars.PUBLISH_NPM == 'true' && env.NPM_TOKEN != '' }}
        run: node scripts/build-npm-packages.mjs --version "${GITHUB_REF_NAME}" --publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
